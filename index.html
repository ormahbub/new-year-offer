<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Year Offer</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main id="main-content">
      <!-- Banner Section Start -->
      <section class="banner-section">
        <div class="container center-content box-bg">
          <h1>Happy New Year</h1>
          <h2>New Year Party Celebration</h2>
        </div>
      </section>
      <!-- Banner Section End -->

      <!-- Offer Section Start -->
      <section class="offer-section">
        <div class="container center-content">
          <h3 class="offer-text">65% OFF</h3>
          <p class="section-subtitle">OUR HOLIDAY DEALS ARE BETTER</p>
          <h3 class="section-title">ALL CATEGORIES</h3>
          <div class="new-year-image">
            <img
              src="./assets/images/happy-new-year-2.png"
              alt="Happy New Year"
            />
          </div>
        </div>
      </section>
      <!-- Offer Section End -->

      <!-- Night Party Section Start -->
      <section class="nightparty-section">
        <div class="container box-bg justify-content">
          <div class="content">
            <h3 class="font-mw">Welcome to midnight party</h3>
            <p class="text">
              Dolor sit amet consectetur. Consequat eget consectetur maecenas
              sed molestie malesuada. Ipsum sed sodales risus ut pellentesque
              vel euismod.
            </p>
            <a href="#">Join Now</a>
          </div>
          <div class="image">
            <img src="./assets/images/year-2024.png" alt="Year 2024" />
          </div>
        </div>
      </section>
      <!-- Night Party Section End -->
    </main>
  </body>
</html>
